<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Inscritos</title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 5px;
            text-align: left;
        }
        .cabecalho-curso {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    
    <div class="cabecalho-curso">
        <div>
            <h2>Lista de inscritos</h2>
            <p>Curso de Frontend Ninja.</p>
        </div>
        <img src="ninja.png" alt="Ícone Frontend Ninja" width="80">
    </div>
    
    <table>
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Nascimento</th>
            <th>Status inscrição</th>
        </tr>
        <tr>
            <td>Bill Gates</td>
            <td>bill@msn.com</td>
            <td>28/10/1955</td>
            <td>Deferido</td>
        </tr>
        <tr>
            <td>Steve Jobs</td>
            <td>jobs@apple.com</td>
            <td>24/02/1955</td>
            <td>Deferido</td>
        </tr>
        <tr>
            <td>Larry Page</td>
            <td>larry@google.com</td>
            <td>24/03/1973</td>
            <td>Deferido</td>
        </tr>
        <tr>
            <td>Mark Zuckerberg</td>
            <td>mark@facebook.com</td>
            <td>14/05/1984</td>
            <td>Indeferido</td>
        </tr>
    </table>
</body>
</html>
