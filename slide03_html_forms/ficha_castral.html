<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ficha Cadastral</title>
    <style>
        table {
            width: 500px;
            border: 0;
            border-spacing: 1px;
            padding: 1px;
            font-family: Arial, sans-serif;
            font-size: small; /* Equivalente ao tamanho 2 antigo */
        }
        h2 {
            text-align: center;
            font-family: serif; /* Fonte padrão do navegador */
        }
    </style>
</head>
<body>
    <h2>Ficha Cadastral</h2>
    
    <form>
        <table>
            <tr>
                <td>Nome:</td>
                <td colspan="3"><input type="text" name="nome" size="55"></td>
            </tr>
            <tr>
                <td>RG:</td>
                <td><input type="text" name="rg" size="13"></td>
                <td align="right">C.P.F.:</td>
                <td><input type="text" name="cpf" size="13"></td>
            </tr>
            <tr>
                <td>Endereço:</td>
                <td colspan="3"><input type="text" name="endereco" size="55"></td>
            </tr>
            <tr>
                <td>Sexo:</td>
                <td>
                    <select name="sexo">
                        <option value="masculino">Masculino</option>
                        <option value="feminino">Feminino</option>
                    </select>
                </td>
                <td align="right">Data Nascimento:</td>
                <td><input type="text" name="datanascimento" size="13"></td>
            </tr>
            <tr>
                <td>Situação Civil:</td>
                <td colspan="3">
                    <input type="radio" name="estadocivil" value="solteiro" id="solteiro"><label for="solteiro">Solteiro(a)</label>
                    <input type="radio" name="estadocivil" value="casado" id="casado"><label for="casado">Casado(a)</label>
                    <input type="radio" name="estadocivil" value="viuvo" id="viuvo"><label for="viuvo">Viúvo(a)</label>
                </td>
            </tr>
            <tr>
                <td colspan="4" align="center">
                    <br>
                    <input type="reset" value="Limpar Dados">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
